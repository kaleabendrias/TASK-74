# SECURITY: The secret values below are for local development only.
# In production, override via Docker secrets, CI/CD env injection, or a
# secrets manager. Never commit production credentials to version control.

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: tourism
      POSTGRES_PASSWORD: tourism_secret_2024
      POSTGRES_DB: tourism_portal
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tourism -d tourism_portal"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "8088:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -ksf https://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    environment:
      # ── Database ──
      DATABASE_URL: "postgres://tourism:tourism_secret_2024@db:5432/tourism_portal"

      # ── HMAC / Signing ──
      HMAC_SECRET: "h4ck-pr00f-hmac-secret-change-in-production-2024"
      REQUEST_SIGNING_KEY: "req-sign-key-tourism-portal-2024"

      # ── Argon2id parameters ──
      ARGON2_MEMORY_KIB: "65536"
      ARGON2_ITERATIONS: "3"
      ARGON2_PARALLELISM: "4"
      ARGON2_OUTPUT_LEN: "32"

      # ── AES-256-GCM column encryption ──
      AES256_MASTER_KEY: "YWVzLTI1Ni1nY20tbWFzdGVyLWtleS0zMmI="

      # ── TOTP ──
      TOTP_ISSUER: "TourismPortal"

      # ── CSRF ──
      CSRF_TOKEN_TTL_SECS: "3600"

      # ── Upload limits ──
      UPLOAD_MAX_SIZE_BYTES: "52428800"
      UPLOAD_ALLOWED_MIMES: "image/jpeg,image/png,video/mp4"

      # ── Feature switches ──
      FEATURE_MFA_ENABLED: "true"
      FEATURE_CSV_IMPORT: "true"
      FEATURE_EXPORT_WATERMARK: "true"
      FEATURE_LODGING_DEPOSIT_CAP: "true"
      FEATURE_CANARY_RELEASE: "false"

      # ── Maintenance window (cron expression) ──
      MAINTENANCE_WINDOW_CRON: "0 3 * * 0"

      # ── Prometheus ──
      PROMETHEUS_SCRAPE_PATH: "/metrics"

      # ── Canary release ──
      CANARY_PROFILE: "stable"

      # ── Config profile ──
      CONFIG_PROFILE: "development"

      # ── Server ──
      BIND_ADDRESS: "0.0.0.0"
      BIND_PORT: "8080"

      RUST_LOG: "warn"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      - backend

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      DATABASE_URL: "postgres://tourism:tourism_secret_2024@db:5432/tourism_portal"
      TEST_BASE_URL: "https://backend:8080"
      RUST_LOG: "info"
    volumes:
      - coverage-data:/coverage
    # cargo-tarpaulin needs SYS_PTRACE to disable ASLR for coverage instrumentation
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    profiles:
      - test

  test-e2e:
    build:
      context: ./e2e
      dockerfile: Dockerfile
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    environment:
      E2E_BASE_URL: "http://frontend:8081"
      E2E_API_URL: "https://backend:8080"
    volumes:
      - e2e-reports:/app/playwright-report
    profiles:
      - e2e

volumes:
  pgdata:
  uploads:
  coverage-data:
  e2e-reports:
