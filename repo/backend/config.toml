# SECURITY: Secret values in this file are development-only defaults.
# In production deployments, override all values in [auth] and [crypto]
# via environment variables or mounted secret files.
#
# Configuration defaults. In production, override secrets via environment
# variables or Docker secrets mounted at runtime. The values below are
# development-only defaults and MUST NOT be used in production.

[server]
bind_address = "0.0.0.0"
bind_port = 8080

[database]
url = "postgres://tourism:tourism_secret_2024@db:5432/tourism_portal"
max_connections = 10
min_connections = 2
connect_timeout_secs = 5

[tls]
cert_path = "/dev/null"
key_path = "/dev/null"

[auth]
hmac_secret = "h4ck-pr00f-hmac-secret-change-in-production-2024"
request_signing_key = "req-sign-key-tourism-portal-2024"
session_ttl_secs = 28800
csrf_token_ttl_secs = 3600

[auth.argon2]
memory_kib = 65536
iterations = 3
parallelism = 4
output_len = 32

[crypto]
aes256_master_key = "YWVzLTI1Ni1nY20tbWFzdGVyLWtleS0zMmI="

[totp]
issuer = "TourismPortal"
digits = 6
period_secs = 30

[uploads]
max_size_bytes = 52428800
allowed_mimes = ["image/jpeg", "image/png", "video/mp4"]
storage_path = "/app/uploads"

[features]
mfa_enabled = true
csv_import = true
export_watermark = true
lodging_deposit_cap = true
canary_release = false

[maintenance]
window_cron = "0 3 * * 0"

[prometheus]
scrape_path = "/metrics"

[canary]
profile = "stable"

[app]
config_profile = "development"
service_name = "tourism-portal-backend"
version = "0.1.0"
