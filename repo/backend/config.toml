[server]
bind_address = "0.0.0.0"
bind_port = 8080

[database]
url = ""
max_connections = 10
min_connections = 2
connect_timeout_secs = 5

[tls]
cert_path = "/app/certs/server.crt"
key_path = "/app/certs/server.key"

[auth]
hmac_secret = ""
request_signing_key = ""
session_ttl_secs = 28800
csrf_token_ttl_secs = 3600

[auth.argon2]
memory_kib = 65536
iterations = 3
parallelism = 4
output_len = 32

[crypto]
aes256_master_key = ""

[totp]
issuer = "TourismPortal"
digits = 6
period_secs = 30

[uploads]
max_size_bytes = 10485760
allowed_mimes = ["image/jpeg", "image/png", "image/webp", "application/pdf"]
storage_path = "/app/uploads"

[features]
mfa_enabled = true
csv_import = true
export_watermark = true
lodging_deposit_cap = true
canary_release = false

[maintenance]
window_cron = "0 3 * * 0"

[prometheus]
scrape_path = "/metrics"

[canary]
profile = "stable"

[app]
config_profile = "development"
service_name = "tourism-portal-backend"
version = "0.1.0"
